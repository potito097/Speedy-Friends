<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy Friends Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }
        
        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        .loading {
            font-size: 1.1em;
            color: #999;
            margin-top: 20px;
        }
        
        .dots {
            display: inline-block;
            margin-left: 5px;
        }
        
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Speedy Friends Team</h1>
        <p class="subtitle">Automatización táctil e interactiva para tu equipo</p>
        <div class="loading">
            Cargando<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
        </div>
    </div>

    <script>
        // Redirigir al archivo principal después de 2 segundos
        setTimeout(function() {
            window.location.href = './Speedy%20bodrio.html';
        }, 2000);
    </script>
</body>
</html>
